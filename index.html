<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>남은자교회 | Namuenja Church</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.45);
    }

    .hero-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .lang-buttons {
      position: absolute;
      top: 30px;
      right: 30px;
      display: flex;
      gap: 10px;
    }

    .lang-buttons button {
      border: 1px solid white;
      background: rgba(255,255,255,0.1);
      color: white;
      padding: 12px 20px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 18px;
    }

    h1 {
      font-size: 72px;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: 28px;
      color: #ddd;
      max-width: 900px;
      line-height: 1.5;
    }

    .sermon-section {
      width: 100%;
      min-height: 100vh;
      background: black;
      padding: 60px 20px;
    }

    .sermon-wrapper {
      max-width: 1400px;
      margin: 0 auto;
    }

    .section-label {
      letter-spacing: 0.4em;
      color: #aaa;
      margin-bottom: 20px;
      font-size: 18px;
    }

    .video-box {
      position: relative;
      width: 100%;
      height: 80vh;
      border-radius: 32px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 30px 100px rgba(0,0,0,0.6);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-text {
      margin-top: 30px;
    }

    .video-text h2 {
      font-size: 52px;
      margin-bottom: 16px;
    }

    .video-text p {
      font-size: 24px;
      color: #bbb;
      line-height: 1.6;
    }

    .playlist-section {
      background: white;
      color: black;
      padding: 100px 20px;
    }

    .playlist-grid {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
    }

    .playlist-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      transition: transform 0.3s ease;
    }

    .playlist-card:hover {
      transform: translateY(-8px);
    }

    .playlist-info {
      padding: 24px;
    }

    .playlist-info h3 {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .playlist-info p {
      color: #666;
      font-size: 18px;
    }

    footer {
      background: #050505;
      text-align: center;
      padding: 80px 20px;
    }

    footer h2 {
      font-size: 56px;
      margin-bottom: 20px;
    }

    footer p {
      color: #999;
      font-size: 22px;
      margin-bottom: 30px;
    }

    .youtube-btn {
      display: inline-block;
      background: #cc0000;
      color: white;
      text-decoration: none;
      padding: 18px 36px;
      border-radius: 999px;
      font-size: 22px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 48px;
      }

      .subtitle {
        font-size: 22px;
      }

      .video-box {
        height: 50vh;
      }

      .video-text h2 {
        font-size: 38px;
      }

      .video-text p {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <img src="https://images.unsplash.com/photo-1504052434569-70ad5836ab65?q=80&w=2000&auto=format&fit=crop" alt="church" />

    <div class="hero-content">
      <div class="lang-buttons">
        <button onclick="setLanguage('kr')">한국어</button>
        <button onclick="setLanguage('en')">English</button>
      </div>

      <h1 id="title">남은자교회</h1>
      <p class="subtitle" id="subtitle">
        세계를 향해 말씀을 전하는 교회
      </p>
    </div>
  </section>

  <section class="sermon-section">
    <div class="sermon-wrapper">
      <div class="section-label">LATEST SERMON</div>

      <div class="video-box">
        <iframe
          src="https://www.youtube-nocookie.com/embed/videoseries?list=UUzZSTCzDgI1XShzERoUMuqA&rel=0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen>
        </iframe>
      </div>

      <div class="video-text">
        <h2 id="sermon-title">최신 설교</h2>
        <p id="sermon-desc">
          남은자교회 유튜브 채널의 최신 설교 영상입니다.
        </p>
      </div>
    </div>
  </section>

  <section class="playlist-section">
    <div class="playlist-grid">

      <div class="playlist-card">
        <div class="playlist-info">
          <h3>무트타무트</h3>
          <p>Revised Edition Series</p>
        </div>
      </div>

      <div class="playlist-card">
        <div class="playlist-info">
          <h3>창세기</h3>
          <p>Genesis</p>
        </div>
      </div>

      <div class="playlist-card">
        <div class="playlist-info">
          <h3>룻기</h3>
          <p>Ruth</p>
        </div>
      </div>

      <div class="playlist-card">
        <div class="playlist-info">
          <h3>오바댜</h3>
          <p>Obadiah</p>
        </div>
      </div>

    </div>
  </section>

  <footer>
    <h2>남은자교회</h2>
    <p>Serving the World Through God's Word</p>

    <a
      class="youtube-btn"
      href="https://www.youtube.com/@jonathan-on7wt"
      target="_blank">
      YouTube Channel
    </a>
  </footer>

  <script>
    function setLanguage(lang) {
      const title = document.getElementById('title');
      const subtitle = document.getElementById('subtitle');
      const sermonTitle = document.getElementById('sermon-title');
      const sermonDesc = document.getElementById('sermon-desc');

      if (lang === 'en') {
        title.innerText = 'Namuenja Church';
        subtitle.innerText = 'Delivering God\'s Word to the Nations';
        sermonTitle.innerText = 'Latest Sermon';
        sermonDesc.innerText = 'Latest sermon video from the Namuenja Church YouTube channel.';
      } else {
        title.innerText = '남은자교회';
        subtitle.innerText = '세계를 향해 말씀을 전하는 교회';
        sermonTitle.innerText = '최신 설교';
        sermonDesc.innerText = '남은자교회 유튜브 채널의 최신 설교 영상입니다.';
      }
    }
  </script>

</body>
</html>
